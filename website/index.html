<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know The Law — Constitutional Rights Navigator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Mobile menu toggle -->
  <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
    ☰ Menu
  </button>

  <!-- Dim overlay — tap to close sidebar on mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="layout">

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-icon">⚖</span>
        <div>
          <div class="brand-name">Know The Law</div>
          <div class="brand-sub">Constitutional Rights Navigator</div>
        </div>
      </div>
      <nav id="amendment-nav"></nav>
      <div class="sidebar-footer">
        For educational purposes only.<br>Not legal advice.
      </div>
    </aside>

    <main class="main">
      <div id="content"></div>
    </main>

  </div>

  <script src="app.js"></script>
  <script>
    // Mobile sidebar toggle
    const toggle  = document.getElementById('menu-toggle');
    const overlay = document.getElementById('sidebar-overlay');
    function closeSidebar() { document.body.classList.remove('menu-open'); }
    toggle.addEventListener('click', () => document.body.classList.toggle('menu-open'));
    overlay.addEventListener('click', closeSidebar);
  </script>
</body>
</html>
